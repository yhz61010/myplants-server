<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日记详情 - MyPlants 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-4">
                    <a href="/admin/" class="text-xl font-bold text-gray-800 hover:text-blue-600">MyPlants 管理后台</a>
                    <span class="text-gray-400">/</span>
                    <a href="/admin/diaries" class="text-gray-600 hover:text-blue-600">日记管理</a>
                    <span class="text-gray-400">/</span>
                    <span class="text-gray-600" id="breadcrumbTitle">日记详情</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="currentUser" class="text-gray-600"></span>
                    <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-md text-sm">
                        退出登录
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-md">
            <div class="p-6 border-b flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-800">日记详情</h1>
                <div class="space-x-2">
                    <button onclick="openEditModal()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-md text-sm">
                        编辑
                    </button>
                    <button onclick="deleteDiary()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-md text-sm">
                        删除
                    </button>
                </div>
            </div>
            
            <div id="diaryContent" class="p-6">
                <p class="text-center text-gray-500">加载中...</p>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b">
                <h2 class="text-xl font-bold text-gray-800">编辑日记</h2>
            </div>
            <form id="editForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">标题 *</label>
                    <input type="text" id="editTitle" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">内容</label>
                    <textarea id="editContent" rows="5"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">图片</label>
                    <div id="imagePreview" class="grid grid-cols-4 gap-3 mb-3"></div>
                    <div id="dropZone"
                        class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer hover:border-green-400 hover:bg-green-50 transition-colors"
                        onclick="document.getElementById('fileInput').click()">
                        <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="handleFiles(this.files)">
                        <svg class="mx-auto h-10 w-10 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                        </svg>
                        <p class="text-sm text-gray-500">点击或拖拽图片到此处上传</p>
                        <p class="text-xs text-gray-400 mt-1">支持 JPG、PNG、GIF 等格式</p>
                    </div>
                    <div id="uploadProgress" class="hidden mt-2">
                        <div class="flex items-center text-sm text-gray-500">
                            <svg class="animate-spin h-4 w-4 mr-2 text-green-500" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                            <span id="uploadStatus">上传中...</span>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">标签（逗号分隔）</label>
                    <input type="text" id="editTags"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div class="flex items-center">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="editIsPublic" class="sr-only peer" checked>
                        <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-green-500"></div>
                        <span class="ml-2 text-sm text-gray-700">公开</span>
                    </label>
                </div>
                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" onclick="closeEditModal()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-md text-sm">取消</button>
                    <button type="submit" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-md text-sm">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="fixed inset-0 bg-black bg-opacity-90 hidden items-center justify-center z-[60] cursor-pointer" onclick="closeLightbox()">
        <button class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300">&times;</button>
        <img id="lightboxImg" class="max-w-[90vw] max-h-[90vh] object-contain rounded-lg">
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        let token, currentUser, diaryId;
        let usersMap = {};
        let uploadedImages = [];
        
        // Check auth
        function checkAuth() {
            token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            if (!token || !userStr) {
                window.location.href = '/admin/login';
                return false;
            }
            currentUser = JSON.parse(userStr);
            if (!currentUser.isAdmin) {
                alert('您没有管理员权限');
                localStorage.clear();
                window.location.href = '/admin/login';
                return false;
            }
            document.getElementById('currentUser').textContent = `欢迎，${currentUser.username}`;
            return true;
        }
        
        // Get diary ID from URL
        function getDiaryId() {
            const path = window.location.pathname;
            const matches = path.match(/\/admin\/diaries\/(\d+)/);
            return matches ? matches[1] : null;
        }
        
        // Load users for mapping
        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/users?limit=100`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (response.ok) {
                    data.items.forEach(u => {
                        usersMap[u.id] = u.username;
                    });
                }
            } catch (err) {
                console.error('Failed to load users:', err);
            }
        }
        
        // Load diary data
        async function loadDiary() {
            if (!diaryId) {
                document.getElementById('diaryContent').innerHTML = '<p class="text-center text-red-500">日记ID无效</p>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/diaries/${diaryId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const diary = await response.json();
                
                if (response.ok) {
                    document.getElementById('breadcrumbTitle').textContent = diary.title;
                    
                    const imagesHtml = diary.images && diary.images.length > 0
                        ? `<div class="grid grid-cols-3 md:grid-cols-4 gap-3 mt-4">
                            ${diary.images.map(img => `
                                <img src="${escapeHtml(img)}" class="w-full h-28 object-cover rounded-lg cursor-pointer hover:opacity-80 transition-opacity" onclick="openLightbox('${escapeHtml(img)}')" onerror="this.src='https://via.placeholder.com/150?text=图片加载失败'">
                            `).join('')}
                           </div>`
                        : '<p class="text-gray-500">无图片</p>';
                    
                    const tagsHtml = diary.tags && diary.tags.length > 0
                        ? diary.tags.map(tag => `<span class="px-2 py-1 bg-green-100 text-green-800 rounded-full text-xs">${escapeHtml(tag)}</span>`).join(' ')
                        : '<span class="text-gray-500">无标签</span>';
                    
                    document.getElementById('diaryContent').innerHTML = `
                        <div class="space-y-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-500 mb-1">ID</label>
                                <p class="text-gray-900">${diary.id}</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-500 mb-1">标题</label>
                                <p class="text-xl font-semibold text-gray-900">${escapeHtml(diary.title)}</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-500 mb-1">作者</label>
                                <p class="text-gray-900">
                                    <a href="/admin/users/${diary.userId}" class="text-blue-500 hover:text-blue-700">
                                        ${usersMap[parseInt(diary.userId)] || `用户 ${diary.userId}`}
                                    </a>
                                </p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-500 mb-1">内容</label>
                                <div class="bg-gray-50 rounded-lg p-4">
                                    <p class="text-gray-900 whitespace-pre-wrap">${escapeHtml(diary.content) || '-'}</p>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-500 mb-2">标签</label>
                                <div class="flex flex-wrap gap-2">${tagsHtml}</div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-500 mb-2">图片</label>
                                ${imagesHtml}
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-500 mb-1">创建时间</label>
                                    <p class="text-gray-900">${formatDate(diary.createdAt)}</p>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-500 mb-1">更新时间</label>
                                    <p class="text-gray-900">${formatDate(diary.updatedAt)}</p>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    // Store diary data for edit
                    window.diaryData = diary;
                } else {
                    document.getElementById('diaryContent').innerHTML = `<p class="text-center text-red-500">${diary.error || '加载失败'}</p>`;
                }
            } catch (err) {
                document.getElementById('diaryContent').innerHTML = '<p class="text-center text-red-500">网络错误</p>';
            }
        }
        
        // Edit modal functions
        function openEditModal() {
            const diary = window.diaryData;
            if (!diary) return;

            document.getElementById('editTitle').value = diary.title;
            document.getElementById('editContent').value = diary.content || '';
            document.getElementById('editTags').value = (diary.tags || []).join(', ');
            document.getElementById('editIsPublic').checked = diary.isPublic !== false;
            uploadedImages = [...(diary.images || [])];
            renderImagePreview();

            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editModal').classList.add('flex');
        }
        
        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
        }
        
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('editTitle').value;
            const content = document.getElementById('editContent').value;
            const tagsText = document.getElementById('editTags').value;

            const images = [...uploadedImages];
            const tags = tagsText.split(',').map(s => s.trim()).filter(s => s);
            const isPublic = document.getElementById('editIsPublic').checked;

            try {
                const response = await fetch(`${API_BASE}/admin/diaries/${diaryId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title, content, images, tags, isPublic })
                });
                
                if (response.ok) {
                    closeEditModal();
                    loadDiary();
                } else {
                    const data = await response.json();
                    alert('更新失败: ' + data.error);
                }
            } catch (err) {
                alert('网络错误');
            }
        });
        
        // Delete diary
        async function deleteDiary() {
            if (!confirm('确定要删除此日记吗？此操作不可恢复。')) return;
            
            try {
                const response = await fetch(`${API_BASE}/admin/diaries/${diaryId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    window.location.href = '/admin/diaries';
                } else {
                    const data = await response.json();
                    alert('删除失败: ' + data.error);
                }
            } catch (err) {
                alert('网络错误');
            }
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = '/admin/login';
        }

        // --- Image upload ---
        const dropZone = document.getElementById('dropZone');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-green-400', 'bg-green-50');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-green-400', 'bg-green-50');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-green-400', 'bg-green-50');
            const files = e.dataTransfer.files;
            if (files.length) handleFiles(files);
        });

        async function handleFiles(files) {
            const progress = document.getElementById('uploadProgress');
            const status = document.getElementById('uploadStatus');
            progress.classList.remove('hidden');

            let uploaded = 0;
            const total = files.length;

            for (const file of files) {
                if (!file.type.startsWith('image/')) continue;
                status.textContent = `上传中 (${uploaded + 1}/${total})...`;

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const resp = await fetch(`${API_BASE}/upload`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    const data = await resp.json();
                    if (resp.ok && data.url) {
                        uploadedImages.push(data.url);
                        renderImagePreview();
                    } else {
                        alert(`上传失败: ${data.error || '未知错误'}`);
                    }
                } catch (err) {
                    alert('上传网络错误');
                }
                uploaded++;
            }

            progress.classList.add('hidden');
            document.getElementById('fileInput').value = '';
        }

        function renderImagePreview() {
            const container = document.getElementById('imagePreview');
            container.innerHTML = uploadedImages.map((url, i) => `
                <div class="relative group">
                    <img src="${escapeHtml(url)}" class="w-full h-20 object-cover rounded-lg border border-gray-200 cursor-pointer hover:opacity-80" onclick="openLightbox('${escapeHtml(url)}')">
                    <button type="button" onclick="event.stopPropagation(); removeImage(${i})"
                        class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">&times;</button>
                </div>
            `).join('');
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderImagePreview();
        }

        // --- Lightbox ---
        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.remove('hidden');
            document.getElementById('lightbox').classList.add('flex');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
            document.getElementById('lightbox').classList.remove('flex');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        // Utils
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }
        
        // Init
        if (checkAuth()) {
            diaryId = getDiaryId();
            loadUsers().then(() => loadDiary());
        }
    </script>
</body>
</html>
